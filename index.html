<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Fin du Quiz</title>

<style>
html, body {
    height: 100%;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;

    background: linear-gradient(180deg, #a8c6d8, #eaf4f4);
    color: #2f3e4e;

    display: flex;
    align-items: center;
    justify-content: center;
}

/* Carte compacte */
.card {
    background: white;
    padding: 18px 15px;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    max-width: 320px;
    width: 90%;
}

/* Logo */
.card-logo {
    width: 70%;
    margin-bottom: 5px;
}

/* Titre */
h2 {
    margin: 5px 0 8px 0;
    font-size: 20px;
}

/* Image compacte */
.card-image {
    width: 38%;
    max-width: 110px;
    border-radius: 10px;
    margin: 6px auto 10px auto;
    display: block;
    box-shadow: 0 3px 8px rgba(0,0,0,0.12);
}

/* Texte ultra compact */
p {
    font-size: 14px;
    line-height: 1.4;
    margin: 0;
}
</style>
</head>

<body>

<div class="card">

    <img src="Logo.png" alt="Logo" class="card-logo">

    <h2>🎉 Bravo !</h2>

    <img src="Clocher.jpg" alt="Clocher" class="card-image">

    <p>
    Tu as percé le secret du clocher de Sainte-Geneviève-sur-Argence<br>
    L’aventure continue !<br>
    D’autres énigmes t’attendent à Argences-en-Aubrac.
    </p>

</div>

</body>
</html>

</body>
</html>
