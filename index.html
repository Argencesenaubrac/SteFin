<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Fin du Quiz</title>

<style>
html, body {
    height: 100%;
}

body {
    margin: 0;
    min-height: 100dvh;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;

    background: linear-gradient(180deg, #a8c6d8, #eaf4f4);
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: #2f3e4e;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 30px 20px;
}

/* Carte */
.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* Logo */
.card-logo {
    max-width: none;
    width: 90%;
    margin-bottom: 0px;
}

/* Texte */
p {
    line-height: 1.6;
    margin-bottom: 15px;
}

.card p:first-of-type {
    margin-top: 8px;
}


button:hover {
    background: #a8844f;
    transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <img src="Logo.png" alt="Logo" class="card-logo">

        <h2>🎉 Bravo !</h2>

        <p>
        Tu as percé le secret du clocher de Sainte-Geneviève…
        </p>

        <p>
        Mais l’aventure continue !
        </p>

        <p>
        D’autres énigmes t’attendent bientôt dans les villages d’Argences-en-Aubrac.  
        À toi de les découvrir !
        </p>

    </div>

</div>

<script>
function restart(){
    window.location.href="index.html";
}
</script>

</body>
</html>
