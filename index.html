<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Fin du Quiz</title>

            margin-bottom: 20px;

        }

            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Logo -->
    <img src="Logo.png" alt="Logo La quête des 11 clochers">

    <h1>🎉 Bravo !</h1>
    <p>
        Tu as percé le secret du clocher de Sainte-Geneviève…

    </p>

</html>
