<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Fin du Quiz</title>

<style>
html, body {
    height: 100%;
}

body {
    margin: 0;
    min-height: 100dvh;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;

    background: linear-gradient(180deg, #a8c6d8, #eaf4f4);
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: #2f3e4e;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px 15px; /* un peu réduit pour mobile */
}

/* Carte */
.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* Logo */
.card-logo {
    width: 85%; /* légèrement réduit */
    margin-bottom: 10px;
}

/* Image clocher */
.card-image {
    width: 48%;
    max-width: 150px;
    border-radius: 12px;
    margin: 10px auto 15px auto;
    display: block;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    transition: transform 0.2s ease;
}

.card-image:hover {
    transform: scale(1.05);
}

/* Texte */
h2 {
    margin-top: 5px;
}

p {
    line-height: 1.6;
    margin-bottom: 15px;
    font-size: 15px; /* plus lisible mobile */
}

.card p:first-of-type {
    margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <img src="Logo.png" alt="Logo" class="card-logo">

        <h2>🎉 Bravo !</h2>

        <img src="Clocher.jpg" alt="Clocher de Sainte-Geneviève" class="card-image">

        <p>
        Tu as percé le secret du clocher de Sainte-Geneviève…
        </p>

        <p>
        Mais l’aventure continue !
        </p>

        <p>
        D’autres énigmes t’attendent bientôt dans les villages d’Argences-en-Aubrac.  
        À toi de les découvrir !
        </p>

    </div>

</div>

</body>
</html>
